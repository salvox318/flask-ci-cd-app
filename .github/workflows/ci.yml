name: CI for Flask Docker App   
on: 
    push:
        branches: [ "main"]
        
    pull_request:
        branches: [ "main"]

permissions:
    contents: read
    packages: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.10'
            - name: Install dependencies
              run: pip install -r requirements.txt
            - name: Run lint checks
              run: python -m flake8 app tests
            - name: Run tests
              run: PYTHONPATH=. pytest 
            

            

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build Docker image
              run: docker build -t ci-cd-docker-pipeline .

            - name: Run Docker container
              run: |
                  docker run -d -p 5000:5000 --name test-container ci-cd-docker-pipeline 
                  sleep 5
                  curl --fail http://localhost:5000/health || (docker logs test-container && exit 1)

            - name: Build and push image to GHCR
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ghcr.io/salvox318/flask-ci-cd-app:latest
        